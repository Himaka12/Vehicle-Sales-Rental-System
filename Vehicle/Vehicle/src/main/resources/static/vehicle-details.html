<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting Vehicle Details | K.D. Auto Traders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #08172f;
            --blue: #2563eb;
            --blue-2: #3b82f6;
            --stroke: #d7e2f0;
            --muted: #61758f;
            --text: #152742;
            --shadow-lg: 0 30px 60px rgba(8, 23, 47, 0.14);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Inter", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 24%),
                linear-gradient(180deg, #f7fbff 0%, #eef4fb 100%);
        }

        .redirect-card {
            width: min(680px, 100%);
            padding: 34px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(215, 226, 240, 0.9);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .redirect-icon {
            width: 68px;
            height: 68px;
            margin: 0 auto 18px;
            border-radius: 22px;
            display: grid;
            place-items: center;
            color: #fff;
            background: linear-gradient(135deg, var(--blue-2), var(--blue));
            box-shadow: 0 18px 30px rgba(37, 99, 235, 0.25);
            font-size: 1.4rem;
        }

        h1 {
            font-family: "Outfit", sans-serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            letter-spacing: -0.05em;
        }

        p {
            margin-top: 12px;
            color: var(--muted);
            line-height: 1.7;
        }

        .redirect-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 22px;
            min-height: 50px;
            padding: 0 20px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--blue-2), var(--blue));
            color: #fff;
            text-decoration: none;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="redirect-card">
        <div class="redirect-icon"><i class="bi bi-arrow-repeat"></i></div>
        <h1>Redirecting to the current vehicle details page</h1>
        <p>This legacy page is no longer used. You will be sent to the correct sale or rental details view automatically.</p>
        <a href="vehicle-inventory.html" class="redirect-link"><i class="bi bi-grid-1x2-fill"></i> Return to Inventory</a>
    </div>

    <script>
        (async function redirectVehicleDetails() {
            const params = new URLSearchParams(window.location.search);
            const vehicleId = params.get("id");

            if (!vehicleId) {
                window.location.replace("vehicle-inventory.html");
                return;
            }

            try {
                const response = await fetch(`/api/vehicles/${vehicleId}`);
                if (!response.ok) {
                    window.location.replace("vehicle-inventory.html");
                    return;
                }

                const vehicle = await response.json();
                const targetPage = String(vehicle.listingType || "").toLowerCase() === "rent"
                    ? "vehicle-details-rent.html"
                    : "vehicle-details-sale.html";

                window.location.replace(`${targetPage}?id=${vehicleId}`);
            } catch (error) {
                window.location.replace("vehicle-inventory.html");
            }
        })();
    </script>
</body>
</html>
