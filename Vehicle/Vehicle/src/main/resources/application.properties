spring.application.name=Vehicle

# Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/vehicle2?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT Settings
app.jwt.secret=${JWT_SECRET:change-this-dev-only-secret-key-please-replace-before-production}
app.jwt.expiration-ms=86400000

# Seeded Admin Settings
app.admin.email=${ADMIN_EMAIL:Kushan.dhanuka.vitharana@gmail.com}
app.admin.full-name=${ADMIN_FULL_NAME:K.D.B Vitharana}
app.admin.contact-number=${ADMIN_CONTACT_NUMBER:0763966698}
app.admin.password=${ADMIN_PASSWORD:Admin@123}

# Gemini review analysis
gemini.api.key=${GEMINI_API_KEY:AIzaSyBA1oxQWa6U84ogMS_T0eVruTLy52-ukhA}
gemini.api.model=${GEMINI_API_MODEL:gemini-3-flash-preview}

# Allow files up to 10MB each, and 50MB total per request

server.tomcat.max-swallow-size=-1


# --- File Upload & Tomcat Security Limits ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ? The Magic Lines: Tells Tomcat to allow up to 200 fields/files per form
server.tomcat.max-part-count=200
server.tomcat.max-parameter-count=10000
